name: christiangeorgelucas/json-logic-tools
version: 0.1.0
language: go
description: >-
  Composable JSON Logic (jsonlogic.com) rule-evaluation nodes wrapping the
  MIT-licensed github.com/diegoholiveira/jsonlogic/v3 — evaluate a rule
  against a data object, partially resolve a rule's variables from data
  without evaluating it, statically extract the data variables a rule
  references, validate that a rule is well-formed, and list every
  supported operator. Every operator exposed is a pure, deterministic
  function of its arguments and the data object: no randomness, wall-clock
  ("now"), or external lookups. Stateless and offline; rule and data JSON
  are each bounded in size (256 KiB) and nesting depth (64 levels) before
  any parsing is attempted, so a pathologically deep-but-small input is
  rejected with a structured error rather than crashing the process.
author: Christian George Lucas
license: MIT
tags:
  - json-logic
  - jsonlogic
  - rules-engine
  - business-rules
  - decision-rules
  - json
nodes:
    - name: Evaluate
      description: >-
        Applies a JSON Logic rule to a data object and returns the result,
        e.g. rule {"==":[{"var":"a"},1]} with data {"a":1} evaluates to
        true. `data` defaults to {} when omitted. Malformed JSON, an
        unsupported operator, a type error surfaced by an operator, or an
        exceeded size/depth bound all return a structured error rather than
        a crash. Deterministic — see ListOperators for the full pure
        operator set.
      input: JsonLogicRule
      output: JsonLogicResult
    - name: ResolveVariables
      description: >-
        Partially evaluates a rule: returns it with every {"var": ...}
        reference substituted by its value from data, while leaving every
        operator itself unevaluated — e.g. {"==":[{"var":"a"},true]} with
        data {"a":"false"} resolves to {"==":["false",true]}. Useful for
        auditing or debugging exactly what data a rule will see before
        running Evaluate. Same bounds and error contract as Evaluate.
      input: JsonLogicRule
      output: JsonLogicResult
    - name: ExtractVariables
      description: >-
        Statically walks a rule and returns the sorted, de-duplicated list
        of data variable paths it references via {"var": ...} — e.g.
        {"and":[{"<":[{"var":"temp"},110]},{"==":[{"var":"pie.filling"},"apple"]}]}
        extracts ["pie.filling","temp"]. The walk mirrors the underlying
        library's own evaluation-time traversal, so the paths reported are
        exactly the ones Evaluate will look up. `data` is ignored — only
        `logic` is used.
      input: JsonLogicRule
      output: JsonLogicVariables
    - name: ValidateRule
      description: >-
        Checks whether a rule is syntactically well-formed JSON Logic —
        valid JSON, and every operator used (recursively) is one this
        package supports. Does not evaluate the rule or check it against
        data, so a structurally valid rule can still error at Evaluate time
        (e.g. a runtime type mismatch). `data` is ignored — only `logic` is
        used.
      input: JsonLogicRule
      output: ValidateRuleResult
    - name: ListOperators
      description: >-
        Returns the full catalog of JSON Logic operators this package
        supports: 36 from the official jsonlogic.com spec plus 3 documented
        non-standard extensions (contains_all/contains_any/contains_none),
        each with a short description and whether it's spec-standard. Takes
        no input.
      input: ListOperatorsRequest
      output: JsonLogicOperators
